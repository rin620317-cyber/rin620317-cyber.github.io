<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>孫のスケジュール表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px;
            min-height: 100vh;
            touch-action: manipulation;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .zoom-info {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            border: 3px solid #667eea;
        }

        .zoom-info span {
            color: #e65100;
            font-size: 20px;
        }

        .title {
            text-align: center;
            color: white;
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .countdown {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #333;
            border: 3px solid #ffb300;
        }

        .countdown .num {
            color: #e65100;
            font-size: 30px;
        }

        .calendar-wrapper {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        .month-calendar {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .month-title {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            text-align: center;
            font-size: 36px;
            font-weight: bold;
        }

        .month-july .month-title {
            background: linear-gradient(135deg, #4facfe 0%, #667eea 100%);
        }

        .month-august .month-title {
            background: linear-gradient(135deg, #ff9a56 0%, #ff6f91 100%);
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: #f0f0f0;
            border-bottom: 3px solid #ddd;
        }

        .weekday {
            padding: 18px;
            text-align: center;
            font-weight: bold;
            color: #333;
            font-size: 20px;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            background: #ddd;
            padding: 2px;
        }

        .day {
            background: white;
            min-height: 150px;
            padding: 12px;
            font-size: 16px;
            position: relative;
            overflow: hidden;
        }

        .day-number {
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            font-size: 24px;
        }

        .day.other-month .day-number {
            color: #ccc;
        }

        .day.saturday:not(.other-month) {
            background: #e8f2fe;
        }

        .day.sunday:not(.other-month) {
            background: #fdeeee;
        }

        .day.holiday {
            background: #ffcdd2;
        }

        .day.holiday .day-number {
            color: #d32f2f;
        }

        .day.today:not(.other-month) {
            background: #fff9c4;
        }

        .events-allday {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 6px;
        }

        .events {
            display: flex;
            font-size: 14px;
            line-height: 1.6;
        }

        .events-col {
            flex: 1;
            min-width: 0;
        }

        .events-col.am {
            padding-right: 6px;
            margin-right: 6px;
            border-right: 2px solid #eee;
        }

        .period-label {
            display: block;
            font-size: 10px;
            font-weight: bold;
            color: #aaa;
            margin-bottom: 2px;
        }

        .event {
            background: #e3f2fd;
            color: #1976d2;
            padding: 6px 8px;
            margin: 4px 0;
            border-radius: 4px;
            border-left: 4px solid #1976d2;
            font-weight: bold;
        }

        .event.jyugi {
            background: #f3e5f5;
            color: #7b1fa2;
            border-left-color: #7b1fa2;
        }

        .event.karate {
            background: #e8f5e9;
            color: #388e3c;
            border-left-color: #388e3c;
        }

        .event.kumon {
            background: #e8f5e9;
            color: #388e3c;
            border-left-color: #388e3c;
        }

        .event.stay {
            background: #fce4ec;
            color: #c2185b;
            border-left-color: #c2185b;
        }

        .event.hoikuen {
            background: #e0f7fa;
            color: #00838f;
            border-left-color: #00838f;
        }

        .event.pool {
            background: #fffde7;
            color: #f9a825;
            border-left-color: #f9a825;
        }

        .legend {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-top: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .legend-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .legend-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .legend-color {
            width: 30px;
            height: 30px;
            border-radius: 3px;
            border-left: 4px solid;
            flex-shrink: 0;
        }

        .legend-text {
            font-size: 18px;
            color: #555;
            font-weight: bold;
        }

        .day.grayscale {
            background: #f5f5f5;
            filter: grayscale(100%);
            opacity: 0.7;
        }

        .day.grayscale .day-number {
            color: #999;
        }

        .day.grayscale .event {
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            .calendar-wrapper {
                grid-template-columns: 1fr;
            }
        }

        .day-weekday {
            display: none;
        }

        @media (max-width: 600px) {
            .title {
                font-size: 28px;
            }

            .weekdays {
                display: none;
            }

            .days {
                display: block;
                gap: 0;
                background: white;
                padding: 0;
            }

            .day {
                display: flex;
                align-items: flex-start;
                gap: 10px;
                min-height: auto;
                padding: 10px 14px;
                border-bottom: 1px solid #eee;
            }

            .day.other-month {
                display: none;
            }

            .day-number {
                flex-shrink: 0;
                width: 34px;
                font-size: 18px;
                margin-bottom: 0;
                padding-top: 2px;
            }

            .day-weekday {
                display: inline-block;
                font-size: 12px;
                font-weight: normal;
                color: #999;
                margin-left: 2px;
            }

            .day.holiday .day-weekday {
                color: #d32f2f;
            }

            .day-content {
                flex: 1;
                min-width: 0;
                display: flex;
                flex-direction: column;
                gap: 4px;
            }

            .events-allday {
                margin-bottom: 0;
            }

            .events {
                display: flex;
            }

            .events-col {
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                gap: 6px;
            }

            .event {
                margin: 0;
                white-space: nowrap;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="zoom-info">
            📱 <span>ピンチイン/ピンチアウト</span>で画面を拡大・縮小できます
        </div>
        <div class="title">孫のスケジュール（7月～8月）</div>

        <div class="countdown" id="countdown"></div>

        <div class="calendar-wrapper">
            <!-- 7月カレンダー -->
            <div class="month-calendar month-july">
                <div class="month-title">2026年7月</div>
                <div class="weekdays">
                    <div class="weekday">日</div>
                    <div class="weekday">月</div>
                    <div class="weekday">火</div>
                    <div class="weekday">水</div>
                    <div class="weekday">木</div>
                    <div class="weekday">金</div>
                    <div class="weekday">土</div>
                </div>
                <div class="days" id="july-days"></div>
            </div>

            <!-- 8月カレンダー -->
            <div class="month-calendar month-august">
                <div class="month-title">2026年8月</div>
                <div class="weekdays">
                    <div class="weekday">日</div>
                    <div class="weekday">月</div>
                    <div class="weekday">火</div>
                    <div class="weekday">水</div>
                    <div class="weekday">木</div>
                    <div class="weekday">金</div>
                    <div class="weekday">土</div>
                </div>
                <div class="days" id="august-days"></div>
            </div>
        </div>

        <div class="legend">
            <div class="legend-title">スケジュール一覧</div>
            <div class="legend-items">
                <div class="legend-item">
                    <div class="legend-color" style="background: #f3e5f5; border-left-color: #7b1fa2;"></div>
                    <div class="legend-text">学校の自習（午前）</div>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #e8f5e9; border-left-color: #388e3c;"></div>
                    <div class="legend-text">習い事（空手16:30～／公文14:30～）</div>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #e3f2fd; border-left-color: #1976d2;"></div>
                    <div class="legend-text">特別イベント</div>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #fce4ec; border-left-color: #c2185b;"></div>
                    <div class="legend-text">お泊り（宿泊・お預け）</div>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #e0f7fa; border-left-color: #00838f;"></div>
                    <div class="legend-text">るあ 保育園休み</div>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #fffde7; border-left-color: #f9a825;"></div>
                    <div class="legend-text">ゆあ プライベートプール</div>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ffcdd2;"></div>
                    <div class="legend-text">祝日</div>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #e8f2fe;"></div>
                    <div class="legend-text">土曜日</div>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #fdeeee;"></div>
                    <div class="legend-text">日曜日</div>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #fff9c4;"></div>
                    <div class="legend-text">本日</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function createCalendar(year, month) {
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDate = new Date(firstDay);
            startDate.setDate(startDate.getDate() - firstDay.getDay());

            const days = [];
            const current = new Date(startDate);

            // 6週間分のデータを作成
            for (let i = 0; i < 42; i++) {
                days.push(new Date(current));
                current.setDate(current.getDate() + 1);
            }

            return days;
        }

        function getEvents(date) {
            const events = [];
            const dayOfWeek = date.getDay(); // 0=日、1=月、2=火...
            const dateNum = date.getDate();
            const month = date.getMonth();
            const year = date.getFullYear();

            // 7月21日～24日：学校の自習（午前）
            if (month === 6 && dateNum >= 21 && dateNum <= 24) {
                events.push({ text: '学校自習', class: 'jyugi', period: 'am' });
            }

            // 7月21日：琉生・ゆあ 歯医者（午後）
            if (month === 6 && dateNum === 21) {
                events.push({ text: '琉生・ゆあ 歯医者', class: 'event', period: 'pm' });
            }

            // 7月25日朝～26日夕方：るあを実家に預ける（通し）
            if (month === 6 && dateNum >= 25 && dateNum <= 26) {
                events.push({ text: 'るあ実家へ', class: 'stay', period: 'all' });
            }

            // 7月25日：笹原まつり（小学校のまつり・夕方）
            if (month === 6 && dateNum === 25) {
                events.push({ text: '笹原まつり', class: 'event', period: 'pm' });
            }

            // 7月27日～29日：学校の自習（午前）
            if (month === 6 && dateNum >= 27 && dateNum <= 29) {
                events.push({ text: '学校自習', class: 'jyugi', period: 'am' });
            }

            // 7月28日：ゆあ プライベートプール（午前）
            if (month === 6 && dateNum === 28) {
                events.push({ text: 'ゆあ プール', class: 'pool', period: 'am' });
            }

            // 7月26日：ベイコムで空手交流会（午前）
            if (month === 6 && dateNum === 26) {
                events.push({ text: '空手交流会', class: 'karate', period: 'am' });
            }

            // 8月1日：琉生のルービックキューブ大会
            if (month === 7 && dateNum === 1) {
                events.push({ text: 'ルービック大会', class: 'event', period: 'am' });
            }

            // 7月31日～8月2日：るあとゆあを預ける（終日）
            if ((month === 6 && dateNum === 31) || (month === 7 && dateNum >= 1 && dateNum <= 2)) {
                events.push({ text: 'るあとゆあ預け', class: 'stay', period: 'all' });
            }

            // 7月31日：eo光工事（13:30～）
            if (month === 6 && dateNum === 31) {
                events.push({ text: 'eo光工事13:30', class: 'event', period: 'pm' });
            }

            // 8月16日～17日：朝来宿泊（両親同行・両日終日）
            if (month === 7 && dateNum >= 16 && dateNum <= 17) {
                events.push({ text: '朝来宿泊', class: 'stay', period: 'all' });
            }

            // 8月10日の週の平日：るあ保育園休み（終日／11日は祝日のため除く）
            if (month === 7 && (dateNum === 10 || dateNum === 12 || dateNum === 13 || dateNum === 14)) {
                events.push({ text: 'るあ保育園休み', class: 'hoikuen', period: 'all' });
            }

            // 8月28日：始業式（午前）
            if (month === 7 && dateNum === 28) {
                events.push({ text: '始業式', class: 'jyugi', period: 'am' });
            }

            // 火曜日：空手（16:30～）
            if (dayOfWeek === 2 && !(month === 6 && dateNum === 26)) {
                events.push({ text: '空手16:30', class: 'karate', period: 'pm' });
            }

            // 木曜日：空手（16:30～）
            if (dayOfWeek === 4) {
                events.push({ text: '空手16:30', class: 'karate', period: 'pm' });
            }

            // 月曜日：公文（14:30～）
            if (dayOfWeek === 1) {
                // 7月31日（木曜日）は公文休みなので、月曜日の確認は不要
                events.push({ text: '公文14:30', class: 'kumon', period: 'pm' });
            }

            // 金曜日：公文（14:30～）
            if (dayOfWeek === 5 && !(month === 6 && dateNum === 31) && !(month === 6 && dateNum === 26)) {
                events.push({ text: '公文14:30', class: 'kumon', period: 'pm' });
            }

            return events;
        }

        function isHoliday(date) {
            const month = date.getMonth();
            const dateNum = date.getDate();

            // 7月20日（海の日）
            if (month === 6 && dateNum === 20) return true;

            // 8月11日（山の日）
            if (month === 7 && dateNum === 11) return true;

            return false;
        }

        function isToday(date) {
            const now = new Date();
            return date.getFullYear() === now.getFullYear() &&
                date.getMonth() === now.getMonth() &&
                date.getDate() === now.getDate();
        }

        function isPast(date) {
            const now = new Date();
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const dateStart = new Date(date.getFullYear(), date.getMonth(), date.getDate());
            return dateStart < todayStart;
        }

        function renderCalendar(year, month, containerId) {
            const days = createCalendar(year, month);
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            days.forEach((date, index) => {
                const dayEl = document.createElement('div');
                dayEl.className = 'day';

                const currentMonth = date.getMonth();
                if (currentMonth !== month) {
                    dayEl.classList.add('other-month');
                }

                if (isHoliday(date)) {
                    dayEl.classList.add('holiday');
                }

                if (date.getDay() === 6) {
                    dayEl.classList.add('saturday');
                } else if (date.getDay() === 0) {
                    dayEl.classList.add('sunday');
                }

                if (isToday(date)) {
                    dayEl.classList.add('today');
                }

                // 8月28日以降をグレースケール表示
                if (date.getMonth() === 7 && date.getDate() >= 28) {
                    dayEl.classList.add('grayscale');
                }

                // 終わった過去の日はグレーアウト
                if (isPast(date)) {
                    dayEl.classList.add('grayscale');
                }

                const dayNumber = document.createElement('div');
                dayNumber.className = 'day-number';
                dayNumber.textContent = date.getDate();

                const weekdayNames = ['日', '月', '火', '水', '木', '金', '土'];
                const dayWeekday = document.createElement('span');
                dayWeekday.className = 'day-weekday';
                dayWeekday.textContent = weekdayNames[date.getDay()];
                dayNumber.appendChild(dayWeekday);

                dayEl.appendChild(dayNumber);

                const events = getEvents(date);
                if (events.length > 0) {
                    const contentEl = document.createElement('div');
                    contentEl.className = 'day-content';

                    const makeEventEl = (event) => {
                        const eventEl = document.createElement('div');
                        eventEl.className = `event ${event.class}`;
                        eventEl.textContent = event.text;
                        return eventEl;
                    };

                    const allEvents = events.filter(e => e.period === 'all');
                    const amEvents = events.filter(e => e.period === 'am');
                    const pmEvents = events.filter(e => e.period === 'pm');

                    if (allEvents.length > 0) {
                        const alldayEl = document.createElement('div');
                        alldayEl.className = 'events-allday';
                        allEvents.forEach(event => alldayEl.appendChild(makeEventEl(event)));
                        contentEl.appendChild(alldayEl);
                    }

                    if (amEvents.length > 0 || pmEvents.length > 0) {
                        const eventsEl = document.createElement('div');
                        eventsEl.className = 'events';

                        const amCol = document.createElement('div');
                        amCol.className = 'events-col am';
                        if (amEvents.length > 0) {
                            const amLabel = document.createElement('span');
                            amLabel.className = 'period-label';
                            amLabel.textContent = '午前';
                            amCol.appendChild(amLabel);
                        }
                        amEvents.forEach(event => amCol.appendChild(makeEventEl(event)));

                        const pmCol = document.createElement('div');
                        pmCol.className = 'events-col pm';
                        if (pmEvents.length > 0) {
                            const pmLabel = document.createElement('span');
                            pmLabel.className = 'period-label';
                            pmLabel.textContent = '午後';
                            pmCol.appendChild(pmLabel);
                        }
                        pmEvents.forEach(event => pmCol.appendChild(makeEventEl(event)));

                        eventsEl.appendChild(amCol);
                        eventsEl.appendChild(pmCol);
                        contentEl.appendChild(eventsEl);
                    }

                    dayEl.appendChild(contentEl);
                }

                container.appendChild(dayEl);
            });
        }

        // カレンダーをレンダリング
        renderCalendar(2026, 6, 'july-days');  // 7月（月は0からなので6）
        renderCalendar(2026, 7, 'august-days'); // 8月

        // 夏休み終了（始業式）までのカウントダウン
        function renderCountdown() {
            const now = new Date();
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const schoolStart = new Date(2026, 7, 28); // 8月28日：始業式
            const diffDays = Math.round((schoolStart - todayStart) / (1000 * 60 * 60 * 24));

            const el = document.getElementById('countdown');
            if (diffDays > 0) {
                el.innerHTML = `夏休み終了（始業式）まで<br>あと <span class="num">${diffDays}</span> 日`;
            } else if (diffDays === 0) {
                el.innerHTML = `今日から新学期です！`;
            } else {
                el.innerHTML = `夏休みは終了しました`;
            }
        }
        renderCountdown();
    </script>
</body>
</html>
